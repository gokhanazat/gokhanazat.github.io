<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite Dijital Menü</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #E65100;
            --primary-light: #FF9800;
            --bg-color: #FAFAFA;
            --card-bg: #FFFFFF;
            --text-main: #212121;
            --text-muted: #757575;
            --border-color: #EEEEEE;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: var(--card-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 90px; /* space for CTA */
        }

        /* App Banner */
        .app-banner {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(230, 81, 0, 0.2);
        }

        .app-banner button {
            background-color: white;
            color: var(--primary);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .app-banner button:hover {
            transform: scale(1.05);
        }

        /* Header */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px 20px 24px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-container {
            width: 80dp;
            height: 80px;
            border-radius: 50%;
            background-color: #FFF3E0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(230, 81, 0, 0.1);
            margin-bottom: 16px;
            overflow: hidden;
            border: 3px solid white;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-placeholder {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .restaurant-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .restaurant-tag {
            font-size: 13px;
            color: var(--text-muted);
            background-color: #F5F5F5;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        /* Category Tabs */
        .categories-wrapper {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; /* Firefox */
        }

        .categories-wrapper::-webkit-scrollbar {
            display: none; /* Safari & Chrome */
        }

        .category-tab {
            display: inline-block;
            padding: 8px 16px;
            margin-right: 8px;
            border-radius: 20px;
            background-color: #F5F5F5;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .category-tab.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(230, 81, 0, 0.25);
        }

        /* Products List */
        .products-container {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .category-section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin: 12px 0 8px 0;
            padding-left: 4px;
            border-left: 4px solid var(--primary);
        }

        .product-card {
            display: flex;
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .product-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 16px;
            font-weight: 800;
            color: var(--primary);
        }

        .product-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background-color: #F5F5F5;
        }

        /* Floating CTA Button */
        .bottom-cta {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 468px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 10px 25px rgba(230, 81, 0, 0.4);
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
        }

        .bottom-cta:hover {
            transform: translateX(-50%) scale(1.02);
            box-shadow: 0 12px 30px rgba(230, 81, 0, 0.5);
        }

        /* Loading & Error States */
        .state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(230, 81, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .state-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .state-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top App Promotion -->
        <div class="app-banner" id="appBanner">
            <span>Uygulamayı indirin, hızlıca sipariş verin!</span>
            <button onclick="openInApp()">AÇ</button>
        </div>

        <div id="mainContent">
            <!-- Loading -->
            <div class="state-container" id="loadingState">
                <div class="spinner"></div>
                <div class="state-title">Menü Yükleniyor</div>
                <div class="state-desc">Lezzetli menümüz hazırlanıyor, lütfen bekleyin...</div>
            </div>
        </div>

        <!-- Dynamic Content will be injected here -->
        
        <!-- Floating CTA -->
        <a id="ctaButton" class="bottom-cta" style="display: none;" onclick="openInApp()">
            Uygulamadan Sipariş Ver
        </a>
    </div>

    <script>
        const SUPABASE_URL = "https://mqcvzojjzjienjcihwyc.supabase.co";
        const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xY3Z6b2pqemppZW5qY2lod3ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNzkxMzYsImV4cCI6MjA5NDc1NTEzNn0.DEwWli244OFGLnX4b6IbDFgxRo5P_Eo2ghxchNXY4P4";
        
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const businessId = urlParams.get('business_id');

        function openInApp() {
            if (businessId) {
                // Try deep link scheme
                window.location.href = `quickbite://order?business_id=${businessId}`;
                // Fallback for store redirection if they don't have it
                setTimeout(() => {
                    alert("Eğer uygulama açılmadıysa Play Store'dan QuickBite uygulamasını indirebilirsiniz.");
                }, 2000);
            }
        }

        async function fetchFromSupabase(table, filter) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
                headers: {
                    "apikey": ANON_KEY,
                    "Authorization": `Bearer ${ANON_KEY}`
                }
            });
            if (!response.ok) throw new Error("Veri yüklenemedi");
            return await response.json();
        }

        async function loadMenu() {
            const mainContent = document.getElementById('mainContent');
            const ctaButton = document.getElementById('ctaButton');

            if (!businessId) {
                mainContent.innerHTML = `
                    <div class="state-container">
                        <div class="state-title" style="color: #d32f2f;">Menü Bulunamadı</div>
                        <div class="state-desc">QR kod veya bağlantı geçersiz. Lütfen tekrar deneyin.</div>
                    </div>
                `;
                return;
            }

            try {
                // Fetch Business
                const businessData = await fetchFromSupabase("businesses", `id=eq.${businessId}`);
                if (!businessData || businessData.length === 0) {
                    throw new Error("İşletme bulunamadı");
                }
                const business = businessData[0];

                // Fetch Products
                const products = await fetchFromSupabase("products", `business_id=eq.${businessId}&is_available=eq.true`);

                // Render Header
                let logoHtml = `<span class="logo-placeholder">${business.name.charAt(0)}</span>`;
                if (business.logo_url) {
                    logoHtml = `<img src="${business.logo_url}" alt="${business.name}">`;
                }

                let html = `
                    <div class="header">
                        <div class="logo-container">
                            ${logoHtml}
                        </div>
                        <h1 class="restaurant-name">${business.name}</h1>
                        <span class="restaurant-tag">Dijital Menü</span>
                    </div>
                `;

                if (products.length === 0) {
                    html += `
                        <div class="state-container">
                            <div class="state-title">Menü Boş</div>
                            <div class="state-desc">Bu işletmeye ait aktif bir ürün bulunmuyor.</div>
                        </div>
                    `;
                    mainContent.innerHTML = html;
                    return;
                }

                // Group by Categories
                const categories = {};
                products.forEach(p => {
                    const cat = p.category || "Diğer";
                    if (!categories[cat]) categories[cat] = [];
                    categories[cat].push(p);
                });

                // Render Categories Tab Bar
                html += `
                    <div class="categories-wrapper">
                `;
                Object.keys(categories).forEach((cat, idx) => {
                    html += `
                        <a href="#cat-${idx}" class="category-tab ${idx === 0 ? 'active' : ''}" onclick="selectTab(this)">
                            ${cat.toUpperCase()}
                        </a>
                    `;
                });
                html += `</div> <div class="products-container">`;

                // Render Products List
                Object.keys(categories).forEach((cat, idx) => {
                    html += `
                        <div id="cat-${idx}">
                            <div class="category-section-title">${cat.toUpperCase()}</div>
                    `;
                    
                    categories[cat].forEach(p => {
                        let imgHtml = "";
                        if (p.image_uri) {
                            imgHtml = `<img class="product-img" src="${p.image_uri}" alt="${p.name}">`;
                        }

                        html += `
                            <div class="product-card" style="margin-bottom: 12px;">
                                <div class="product-info">
                                    <div>
                                        <div class="product-name">${p.name}</div>
                                        <div class="product-desc">${p.description || ''}</div>
                                    </div>
                                    <div class="product-price">${parseFloat(p.price).toFixed(2)} TL</div>
                                </div>
                                ${imgHtml}
                            </div>
                        `;
                    });

                    html += `</div>`;
                });

                html += `</div>`;
                mainContent.innerHTML = html;
                ctaButton.style.display = "block";

            } catch (err) {
                mainContent.innerHTML = `
                    <div class="state-container">
                        <div class="state-title" style="color: #d32f2f;">Bir Hata Oluştu</div>
                        <div class="state-desc">${err.message || 'Veriler yüklenirken bir problem oluştu.'}</div>
                    </div>
                `;
            }
        }

        function selectTab(element) {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            element.classList.add('active');
        }

        // Initialize
        loadMenu();
    </script>
</body>
</html>
